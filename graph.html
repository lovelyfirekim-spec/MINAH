<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InBody App - 변화 그래프</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .period-tabs {
            display: flex;
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 4px;
            margin: 16px;
        }
        .period-btn {
            flex: 1;
            height: 40px;
            border: none;
            background: transparent;
            color: var(--text-sub);
            font-size: 14px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .period-btn.active {
            background-color: #F97316; /* 오렌지 */
            color: #fff;
        }
        
        .graph-wrapper {
            margin: 0 16px 24px 16px;
        }
        .graph-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 700;
        }
        .graph-box {
            height: 160px;
            background-color: var(--bg-color);
            border-radius: 12px;
            padding: 16px 8px 8px 8px;
        }
        .icon-weight { color: var(--weight-color); }
        .icon-fat { color: var(--fat-color); }
        .icon-muscle { color: var(--muscle-color); }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="title">신체 변화 추이</h1>
    </header>

    <!-- 기간 선택 탭 -->
    <div class="period-tabs" id="periodTabs">
        <button class="period-btn active">1주</button>
        <button class="period-btn">1개월</button>
        <button class="period-btn">3개월</button>
    </div>

    <!-- 체중 그래프 -->
    <div class="graph-wrapper">
        <div class="graph-header icon-weight">
            <span>↔</span> 체중 변화
        </div>
        <div class="graph-box">
            <canvas id="weightLine"></canvas>
        </div>
    </div>

    <!-- 체지방 그래프 -->
    <div class="graph-wrapper">
        <div class="graph-header icon-fat">
            <span>↘</span> 체지방 변화
        </div>
        <div class="graph-box">
            <canvas id="fatLine"></canvas>
        </div>
    </div>

    <!-- 골격근 그래프 -->
    <div class="graph-wrapper" style="margin-bottom: 40px;">
        <div class="graph-header icon-muscle">
            <span>↗</span> 골격근량 변화
        </div>
        <div class="graph-box">
            <canvas id="muscleLine"></canvas>
        </div>
    </div>

    <!-- 하단 탭바 -->
    <nav class="tabbar">
        <a href="index.html" class="tabbar-item">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            홈
        </a>
        <a href="inbody.html" class="tabbar-item active">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
            기록
        </a>
        <a href="report.html" class="tabbar-item">
            <svg viewBox="0 0 24 24"><path d="M19 8H5c-1.103 0-2 .897-2 2v4c0 1.103.897 2 2 2h14c1.103 0 2-.897 2-2v-4c0-1.103-.897-2-2-2zm0 6H5v-4h14v4z"/><path d="M5 4h14v2H5zm0 14h14v2H5z"/></svg>
            리포트
        </a>
        <a href="goal.html" class="tabbar-item">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
            마이
        </a>
    </nav>

    <script>
        // 기간 탭 토글
        const tabs = document.querySelectorAll('.period-btn');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            });
        });

        // 그래프 공통 옵션
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: { backgroundColor: '#1A2B3C', titleColor: '#fff', displayColors: false }
            },
            scales: {
                x: {
                    grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false },
                    ticks: { color: '#94A3B8', font: { size: 10 } }
                },
                y: {
                    grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false },
                    ticks: { color: '#94A3B8', font: { size: 10 } }
                }
            }
        };

        const labels = ['월', '화', '수', '목', '금', '토', '일'];

        // 체중
        const weightCtx = document.getElementById('weightLine').getContext('2d');
        new Chart(weightCtx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '체중(kg)',
                    data: [65.3, 65.2, 65.2, 65.0, 65.1, 65.0, 64.9],
                    borderColor: '#00D4FF',
                    borderWidth: 2,
                    pointBackgroundColor: '#00D4FF',
                    pointRadius: 4,
                    tension: 0.3
                }]
            },
            options: { ...commonOptions, scales: { ...commonOptions.scales, y: { ...commonOptions.scales.y, min: 64, max: 66 } } }
        });

        // 체지방
        const fatCtx = document.getElementById('fatLine').getContext('2d');
        new Chart(fatCtx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '체지방(%)',
                    data: [22.3, 22.2, 22.2, 22.1, 22.1, 22.0, 22.0],
                    borderColor: '#A855F7',
                    borderWidth: 2,
                    pointBackgroundColor: '#A855F7',
                    pointRadius: 4,
                    tension: 0.3
                }]
            },
            options: { ...commonOptions, scales: { ...commonOptions.scales, y: { ...commonOptions.scales.y, min: 21, max: 23 } } }
        });

        // 골격근
        const muscleCtx = document.getElementById('muscleLine').getContext('2d');
        new Chart(muscleCtx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '골격근(kg)',
                    data: [27.9, 27.9, 28.0, 28.1, 28.2, 28.3, 28.4],
                    borderColor: '#10B981',
                    borderWidth: 2,
                    pointBackgroundColor: '#10B981',
                    pointRadius: 4,
                    tension: 0.3
                }]
            },
            options: { ...commonOptions, scales: { ...commonOptions.scales, y: { ...commonOptions.scales.y, min: 27, max: 29 } } }
        });
    </script>
</body>
</html>
